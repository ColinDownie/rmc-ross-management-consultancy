<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/dark.css">
</head>
<body>

<header>
    <div class="logo">Ross Management Consultancy</div>
    <nav class="main-menu">
        <a href="../about/index.html">About</a>
        <a href="../services/index.html">Services</a>
        <a href="../approach/index.html">Approach</a>
        <a href="../case-studies/index.html">Case Studies</a>
        <a href="../clients/index.html">Clients</a>
        <a href="../contact/index.html" class="active">Contact</a>
    </nav>

    <div class="theme-toggle" onclick="toggleTheme()">Dark Mode</div>
</header>

<section class="hero">
    <h1>Contact Us</h1>
    <p>Clear conversations. Straight answers.</p>
</section>

<section class="content">

    <div class="blank-box">
        <h2>Email</h2>
        <p>info@rossconsultancygroup.com</p>
    </div>

    <div class="blank-box">
        <h2>Location</h2>
        <p>Manchester, United Kingdom</p>
    </div>

</section>

<footer>
    <p>© Ross Consultancy Group</p>
</footer>

<script>
function toggleTheme() {
    const currentTheme = document.documentElement.getAttribute("data-theme");
    const newTheme = currentTheme === "dark" ? "light" : "dark";
    document.documentElement.setAttribute("data-theme", newTheme);
    localStorage.setItem("theme", newTheme);
    updateToggleText(newTheme);
}
function updateToggleText(theme) {
    const toggle = document.querySelector(".theme-toggle");
    toggle.textContent = theme === "dark" ? "Light Mode" : "Dark Mode";
}
document.addEventListener("DOMContentLoaded", () => {
    const savedTheme = localStorage.getItem("theme") || "light";
    document.documentElement.setAttribute("data-theme", savedTheme);
    updateToggleText(savedTheme);
});
</script>

</body>
</html>
